services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: fast-ray-gram
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      APP__HOST: 0.0.0.0
      APP__PORT: 8000
      DB__URL: sqlite+aiosqlite:////app/database/data.db
    volumes:
      - ./database:/app/database
    restart: unless-stopped

  invoice-worker:
    image: curlimages/curl:8.12.1
    container_name: fast-ray-gram-invoice-worker
    env_file:
      - .env
    environment:
      APP_URL: http://app:8000
      CHECK_INTERVAL_SEC: ${CHECK_INTERVAL_SEC:-30}
    volumes:
      - ./docker/invoice-worker.sh:/invoice-worker.sh:ro
    entrypoint: ["/bin/sh", "/invoice-worker.sh"]
    depends_on:
      - app
    restart: unless-stopped
